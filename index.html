<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FAIL Academy — Campus Map</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header id="topbar">
    <div class="bar-left">
      <button id="open-menu" type="button">☰ Index</button>
      <div class="title-block">
        <h1>FAIL Academy</h1>
        <p class="subtitle">Faculty of Arms, Inquiry &amp; Lore</p>
      </div>
    </div>
    <div id="search-wrap" role="search">
      <input type="search" id="search-input" placeholder="Search… ( / )" autocomplete="off" aria-label="Search entities" />
      <ul id="search-results" role="listbox" hidden></ul>
    </div>

    <div class="bar-right">
      <span class="file-tag">Campus Dossier</span>
      <div id="dice-wrap">
        <button id="dice-btn" type="button">&#9861; Dice</button>
      </div>
      <button id="generator-btn" type="button">&#9860; Generate</button>
      <button id="github-sync-btn" type="button" hidden>⛓ Link GitHub</button>
      <button id="dm-toggle" type="button" aria-pressed="false">DM Mode: OFF</button>
    </div>
  </header>

  <p id="load-error" hidden>
    Couldn't load location data. Launch the app via <strong>start-map.bat</strong>
    (or a local server) rather than opening the file directly — see the README.
  </p>

  <div id="location-bar"></div>
  <main id="dashboard"></main>

  <!-- ARCHIVED: campus map — restore when repurposing as a dashboard widget
  <main id="map-stage">
    <div id="map-frame">
      <img id="campus-map" src="assets/campus_map.png" alt="FAIL Academy campus map" />
      <div id="hotspot-layer"></div>
    </div>
  </main>
  -->

  <!-- Slide-out Locations panel -->
  <div id="panel-backdrop"></div>
  <aside id="locations-panel" aria-hidden="true" aria-label="Locations">
    <header id="panel-header">
      <h2>Index</h2>
      <button id="close-menu" type="button" aria-label="Close">&times;</button>
    </header>
    <div id="locations-list"><!-- grouped list injected by menu.js --></div>
  </aside>

  <script src="js/data.js"></script>
  <script src="js/state.js"></script>
  <script src="js/github-state.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/map.js"></script>
  <script src="js/generator.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/search.js"></script>
  <script src="js/dice.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
